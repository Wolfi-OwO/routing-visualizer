name: Release → Azure Container Apps

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Image tag (e.g. v1.0.0)"
        required: true

permissions:
  id-token: write   # request the OIDC token for secretless Azure login
  contents: read

concurrency:
  group: release-aca
  cancel-in-progress: false

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    environment: production

    steps:
      - uses: actions/checkout@v4

      # ----------------------------
      # 1. Metadata
      # ----------------------------
      - name: Build metadata
        id: meta
        run: |
          TAG="${{ github.event.release.tag_name || github.event.inputs.tag }}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"
          echo "date=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"

      # ----------------------------
      # 2. Build frontend
      # ----------------------------
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: application/client/package-lock.json

      - name: Build client
        working-directory: application/client
        env:
          VITE_APP_VERSION: ${{ steps.meta.outputs.version }}
          VITE_APP_REVISION: ${{ github.sha }}
          VITE_APP_CREATED: ${{ steps.meta.outputs.date }}
        run: |
          npm ci
          npm run build

      # ----------------------------
      # 3. Azure Login (OIDC — no stored secret)
      # ----------------------------
      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      # ----------------------------
      # 4. Build image in ACR
      # ----------------------------
      - name: Build image in ACR
        run: |
          az acr build \
            --registry ${{ vars.ACR_NAME }} \
            --image ${{ vars.IMAGE_NAME }}:${{ steps.meta.outputs.tag }} \
            --image ${{ vars.IMAGE_NAME }}:latest \
            --build-arg APP_VERSION=${{ steps.meta.outputs.version }} \
            --build-arg VCS_REF=${{ github.sha }} \
            --build-arg BUILD_DATE=${{ steps.meta.outputs.date }} \
            ./application

      # ----------------------------
      # 5. Deploy to Container Apps
      # ----------------------------
      - name: Deploy to Container App
        run: |
          az containerapp update \
            --name ${{ vars.CONTAINERAPP_NAME }} \
            --resource-group ${{ vars.RESOURCE_GROUP }} \
            --image ${{ vars.ACR_NAME }}.azurecr.io/${{ vars.IMAGE_NAME }}:${{ steps.meta.outputs.tag }}